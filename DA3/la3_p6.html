<!DOCTYPE html>
<html>

<head>
<title>Student Information System</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px gray;
}

input{
width:90%;
padding:8px;
margin:8px;
}

button{
padding:8px 15px;
margin:10px;
background:#003366;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table, th, td{
border:1px solid black;
}

th{
background:#003366;
color:white;
}

</style>

</head>

<body>

<h3>Name: K.GAGAN DINESH</h3>
<h3>Register Number: 24BDS0037</h3>

<hr>

<div class="container">

<h2>Student Information System</h2>

<form id="studentForm">

<input type="text" id="name" placeholder="Student Name"><br>

<input type="text" id="regno" placeholder="Register Number"><br>

<input type="text" id="dept" placeholder="Department"><br>

<button type="button" onclick="addStudent()">Add Student</button>

<button type="reset" onclick="setFocus()">Reset</button>

</form>

<table id="studentTable">

<tr>
<th>Name</th>
<th>Register Number</th>
<th>Department</th>
</tr>

</table>

</div>

<script>

var students = [];

function Student(name, regno, dept){
this.name = name;
this.regno = regno;
this.dept = dept;
}

function addStudent(){

var name = document.getElementById("name").value;
var regno = document.getElementById("regno").value;
var dept = document.getElementById("dept").value;

var studentObj = new Student(name, regno, dept);

students.push(studentObj);

displayStudents();

document.getElementById("studentForm").reset();

setFocus();

}

function displayStudents(){

var table = document.getElementById("studentTable");

table.innerHTML =
"<tr><th>Name</th><th>Register Number</th><th>Department</th></tr>";

for(var i=0;i<students.length;i++){

var row =
"<tr>" +
"<td>"+students[i].name+"</td>" +
"<td>"+students[i].regno+"</td>" +
"<td>"+students[i].dept+"</td>" +
"</tr>";

table.innerHTML += row;

}

}

function setFocus(){

document.getElementById("name").focus();

}

</script>

</body>
</html>
