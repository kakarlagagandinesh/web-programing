<!DOCTYPE html>
<html>

<head>

<title>Login Window</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-color:#f2f2f2;
font-family:Arial;
}

.login-box{
background:white;
padding:30px;
border:1px solid #ccc;
border-radius:8px;
width:300px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
margin-bottom:20px;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:95%;
padding:10px;
background-color:#007BFF;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background-color:#0056b3;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button>Login</button>

</div>

</body>

</html>
