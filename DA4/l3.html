"<!DOCTYPE html>
<html>

<head>

<title>React Image Gallery</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

<style>

.container{
width:600px;
margin:auto;
text-align:center;
}

.preview{
width:400px;
height:250px;
margin-bottom:20px;
border-radius:10px;
transition:0.3s;
}

.gallery{
display:flex;
justify-content:center;
gap:10px;
}

.thumbnail{
width:100px;
height:70px;
cursor:pointer;
border-radius:5px;
transition:0.3s;
}

.thumbnail:hover{
transform:scale(1.1);
}

</style>

</head>

<body>

<h3>Name: K.GAGAN DINESH</h3>
<h3>Register Number: 24BDS0037</h3>

<hr>

<div id="root"></div>

<script type="text/babel">

function ImageGallery(){

const images = [
"https://picsum.photos/id/1015/400/250",
"https://picsum.photos/id/1016/400/250",
"https://picsum.photos/id/1018/400/250",
"https://picsum.photos/id/1020/400/250"
];

const [selectedImage,setSelectedImage] = React.useState(images[0]);

return(

<div className="container">

<h2>React Image Gallery</h2>

<img src={selectedImage} className="preview" />

<div className="gallery">

{images.map((img,index)=>(
<img 
key={index}
src={img}
className="thumbnail"
onClick={()=>setSelectedImage(img)}
/>
))}

</div>

</div>

);

}

const root = ReactDOM.createRoot(document.getElementById("root"));

root.render(<ImageGallery/>);

</script>

</body>

</html>




"
