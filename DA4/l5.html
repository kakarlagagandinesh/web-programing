<!DOCTYPE html>
<html>

<head>

<title>React Todo List</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

<style>

.container{
width:350px;
margin:auto;
padding:20px;
border:2px solid #333;
border-radius:10px;
background:#f4f4f4;
text-align:center;
}

input{
width:70%;
padding:8px;
margin:5px;
}

button{
padding:8px 15px;
background:#002366;
color:white;
border:none;
border-radius:5px;
margin-left:5px;
}

ul{
text-align:left;
}

</style>

</head>

<body>

<h3>Name: K.GAGAN DINESH</h3>
<h3>Register Number: 24BDS0037</h3>

<hr>

<div id="root"></div>

<script type="text/babel">

function TodoApp(){

const [task,setTask] = React.useState("");
const [tasks,setTasks] = React.useState([]);

const addTask = () =>{

if(task.trim() === "") return;

setTasks([...tasks, task]);
setTask("");

};

return(

<div className="container">

<h2>Todo List</h2>

<input
type="text"
value={task}
placeholder="Enter Task"
onChange={(e)=>setTask(e.target.value)}
/>

<button onClick={addTask}>Add</button>

<ul>

{tasks.map((t,index)=>(
<li key={index}>{t}</li>
))}

</ul>

</div>

);

}

const root = ReactDOM.createRoot(document.getElementById("root"));

root.render(<TodoApp/>);

</script>

</body>

</html>
