<!DOCTYPE html>
<html>
<head>
    <title>Admin - All Responses</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .table-container {
            max-height: 450px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-top: 20px;
            background: white;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border-bottom: 1px solid #ddd;
            padding: 15px;
            text-align: left;
        }
        th {
            background-color: #2575fc;
            color: white;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        tr:nth-child(even) {
            background-color: #f8f9fa;
        }
        tr:hover {
            background-color: #e9ecef;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="quiz-container" style="max-width: 900px; width: 100%; padding: 40px;">
    <h2 style="text-align: center; color: #333; margin-bottom: 5px;">Admin Dashboard</h2>
    <div class="sub" style="font-size: 16px; color: #666; text-align: center;">All Submitted Responses</div>

    <div class="header-actions">
        <button class="btn" onclick="window.location.href='index.html'" style="margin: 0; padding: 10px 20px;">Return to Login</button>
        <span style="font-weight: bold; color: green;" id="totalCount">Total Submissions: 0</span>
        <button class="btn" onclick="clearData()" style="margin: 0; background: #e53935; padding: 10px 20px;">Clear Data</button>
    </div>

    <!-- The 50 students capacity box -->
    <div class="table-container">
        <table id="responsesTable">
            <thead>
                <tr>
                    <th style="width: 10%;">#</th>
                    <th style="width: 40%;">Email ID</th>
                    <th style="width: 20%;">Score</th>
                    <th style="width: 30%;">Date & Time</th>
                </tr>
            </thead>
            <tbody id="responses">
                <!-- Responses will be populated here -->
            </tbody>
        </table>
    </div>
</div>

<script>
    function loadResponses() {
        let submissions = JSON.parse(localStorage.getItem("quiz_submissions")) || [];
        let tbody = document.getElementById("responses");
        let countSpan = document.getElementById("totalCount");
        
        tbody.innerHTML = ""; // Clear existing

        countSpan.innerText = `Total Submissions: ${submissions.length}`;

        if(submissions.length === 0) {
            tbody.innerHTML = "<tr><td colspan='4' style='text-align:center; padding: 30px; color: gray;'>No submissions yet.</td></tr>";
            return;
        }

        // Show latest submissions first
        submissions.slice().reverse().forEach((s, index) => {
            let tr = document.createElement("tr");
            let maxS = s.maxScore || 2; 
            tr.innerHTML = `
                <td><strong>${submissions.length - index}</strong></td>
                <td>${s.email}</td>
                <td style="font-weight: bold; color: #2575fc;">${s.score} / ${maxS}</td>
                <td style="font-size: 14px; color: #555;">${s.date}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function clearData() {
        if(confirm("Are you sure you want to delete all submitted responses? This cannot be undone.")) {
            localStorage.removeItem("quiz_submissions");
            loadResponses();
        }
    }

    // Load on start
    loadResponses();
</script>

</body>
</html>
